# UniBot Agent — конфигурация LLM-моделей через RouterAI
# Скопируйте в config.yaml и заполните реальными значениями.
# API-ключ задаётся в .env (ROUTERAI_API_KEY).
# config.yaml НЕ коммитится (добавлен в .gitignore).

routerai:
  # Базовый URL RouterAI API
  base_url: "https://routerai.ru/api/v1"

  # Модель для ReAct-агента (формат: provider/model-name)
  # Полный каталог: https://routerai.ru/models
  model: "openai/gpt-4o"
  temperature: 0.1
  max_tokens: 4096

# Контекстные окна для популярных моделей (токенов)
context_windows:
  gpt-4o: 128000
  gpt-4.1: 128000
  gpt-4-turbo: 128000
  gpt-4: 8192
  gpt-3.5: 16385
  o1: 128000
  o3: 128000
  o4: 128000
  claude: 200000
  gigachat: 32000
  deepseek: 128000
  gemini: 1048576
