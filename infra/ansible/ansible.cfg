[defaults]
host_key_checking = False
deprecation_warnings = False
# Долгие задачи (сборка образов) не должны рвать соединение по таймауту.
timeout = 60

[ssh_connection]
# Keepalive: пинговать хост каждые 30 c, терпеть до 10 мин тишины во время
# длинных задач. ControlPersist переиспользует одно SSH-соединение.
ssh_args = -o ServerAliveInterval=30 -o ServerAliveCountMax=20 -o ControlMaster=auto -o ControlPersist=600s
pipelining = True
