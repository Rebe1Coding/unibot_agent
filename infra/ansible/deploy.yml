---
# ════════════════════════════════════════════════════════════════
# UniBot — Full Deployment Playbook
# ════════════════════════════════════════════════════════════════
#
# Usage:
#   # First time — full setup:
#   ansible-playbook -i inventory.yml deploy.yml -e @vars.yml
#
#   # Only redeploy app (skip server setup):
#   ansible-playbook -i inventory.yml deploy.yml -e @vars.yml --tags deploy
#
#   # Only update .env and restart:
#   ansible-playbook -i inventory.yml deploy.yml -e @vars.yml --tags config
#
# ════════════════════════════════════════════════════════════════

- name: Deploy UniBot
  hosts: unibot
  become: true
  # Значения по умолчанию. Любую из переменных можно переопределить через
  # -e (extra-vars имеют более высокий приоритет, чем play-vars).
  vars:
    app_dir: /opt/unibot
    repo_url: https://github.com/Rebe1Coding/unibot_agent.git
    repo_branch: main
    deploy_user: deploy
    open_ports:
      - "22/tcp"
      - "80/tcp"
      - "8001/tcp"
      - "3000/tcp"

  tasks:
    # ══════════════════════════════════════════
    # 1. Server Preparation
    # ══════════════════════════════════════════

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
      tags: [setup]

    - name: Install system dependencies
      ansible.builtin.apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
          - git
          - ufw
          - python3-pip
          - python3-docker
        state: present
      tags: [setup]

    # ── Swap (предохранитель от OOM при сборке образов) ──
    - name: Create swap file
      ansible.builtin.command:
        cmd: fallocate -l 4G /swapfile
        creates: /swapfile
      tags: [setup]

    - name: Set swap file permissions
      ansible.builtin.file:
        path: /swapfile
        mode: "0600"
      tags: [setup]

    - name: Format swap file
      ansible.builtin.command:
        cmd: mkswap /swapfile
      register: mkswap_result
      changed_when: "'swapspace' in mkswap_result.stdout"
      failed_when: mkswap_result.rc != 0 and 'already' not in mkswap_result.stderr
      tags: [setup]

    - name: Enable swap
      ansible.builtin.command:
        cmd: swapon /swapfile
      register: swapon_result
      changed_when: swapon_result.rc == 0
      failed_when: swapon_result.rc != 0 and 'already' not in swapon_result.stderr
      tags: [setup]

    - name: Persist swap in fstab
      ansible.builtin.lineinfile:
        path: /etc/fstab
        line: "/swapfile none swap sw 0 0"
        state: present
      tags: [setup]

    # ══════════════════════════════════════════
    # 2. Docker Installation
    # ══════════════════════════════════════════

    - name: Check if Docker is installed
      ansible.builtin.command: docker --version
      register: docker_check
      ignore_errors: true
      changed_when: false
      tags: [setup, docker]

    - name: Ensure apt keyrings directory exists
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"
      when: docker_check.rc != 0
      tags: [setup, docker]

    - name: Add Docker GPG key
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"
      when: docker_check.rc != 0
      tags: [setup, docker]

    - name: Add Docker repository
      ansible.builtin.apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present
        filename: docker
      when: docker_check.rc != 0
      tags: [setup, docker]

    - name: Install Docker Engine
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present
        update_cache: true
      when: docker_check.rc != 0
      tags: [setup, docker]

    - name: Start and enable Docker
      ansible.builtin.systemd:
        name: docker
        state: started
        enabled: true
      tags: [setup, docker]

    - name: Add deploy user to docker group
      ansible.builtin.user:
        name: "{{ deploy_user }}"
        groups: docker
        append: true
      tags: [setup, docker]

    # ══════════════════════════════════════════
    # 3. Firewall
    # ══════════════════════════════════════════

    - name: Reset UFW to defaults
      community.general.ufw:
        state: reset
      tags: [setup, firewall]

    - name: Set UFW default deny incoming
      community.general.ufw:
        direction: incoming
        policy: deny
      tags: [setup, firewall]

    - name: Set UFW default allow outgoing
      community.general.ufw:
        direction: outgoing
        policy: allow
      tags: [setup, firewall]

    - name: Allow configured ports through firewall
      community.general.ufw:
        rule: allow
        port: "{{ item.split('/')[0] }}"
        proto: "{{ item.split('/')[1] | default('tcp') }}"
      loop: "{{ open_ports }}"
      tags: [setup, firewall]

    - name: Enable UFW
      community.general.ufw:
        state: enabled
      tags: [setup, firewall]

    # ══════════════════════════════════════════
    # 4. Clone / Pull Repository
    # ══════════════════════════════════════════

    - name: Create application directory
      ansible.builtin.file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ deploy_user }}"
        group: "{{ deploy_user }}"
        mode: "0755"
      tags: [deploy]

    - name: Clone or update repository
      ansible.builtin.git:
        repo: "{{ repo_url }}"
        dest: "{{ app_dir }}"
        version: "{{ repo_branch }}"
        force: true
      become_user: "{{ deploy_user }}"
      tags: [deploy]

    # ══════════════════════════════════════════
    # 5. Configuration (per-service .env)
    # ══════════════════════════════════════════
    # docker-compose reads a SEPARATE .env per service, not one root file.
    # The committed *.env.example files already carry correct values and the
    # default passwords that docker-compose.yml hard-codes — so we copy them
    # as-is and only inject the user-specific secrets below.

    - name: Create per-service .env from committed examples
      ansible.builtin.copy:
        src: "{{ app_dir }}/{{ item }}/.env.example"
        dest: "{{ app_dir }}/{{ item }}/.env"
        remote_src: true
        owner: "{{ deploy_user }}"
        group: "{{ deploy_user }}"
        mode: "0600"
        force: true
      loop:
        - university-agent
        - workers
        - indexer
        - web-gui
        - log-viewer
      tags: [deploy, config]

    - name: Inject RouterAI API key into agent and workers .env
      ansible.builtin.replace:
        path: "{{ app_dir }}/{{ item }}/.env"
        regexp: '^ROUTERAI_API_KEY=.*$'
        replace: "ROUTERAI_API_KEY={{ routerai_api_key }}"
      loop:
        - university-agent
        - workers
      tags: [deploy, config]

    - name: Inject web-search API keys into agent .env (optional)
      ansible.builtin.replace:
        path: "{{ app_dir }}/university-agent/.env"
        regexp: "^{{ item.key }}=.*$"
        replace: "{{ item.key }}={{ item.value }}"
      loop:
        - { key: "TAVILY_API_KEY", value: "{{ tavily_api_key | default('') }}" }
        - { key: "SERPAPI_API_KEY", value: "{{ serpapi_api_key | default('') }}" }
      tags: [deploy, config]

    - name: Set indexer admin password
      ansible.builtin.replace:
        path: "{{ app_dir }}/indexer/.env"
        regexp: '^ADMIN_PASSWORD=.*$'
        replace: "ADMIN_PASSWORD={{ indexer_admin_password | default('change-me-indexer-password') }}"
      tags: [deploy, config]

    # ══════════════════════════════════════════
    # 6. Build & Deploy
    # ══════════════════════════════════════════

    # Последовательная сборка (без --parallel): на 7-8 ГБ RAM параллельная
    # сборка нескольких образов с torch/transformers упирается в память и
    # роняет сервер по OOM. async+poll держит SSH-сессию живой на время сборки.
    - name: Build Docker images
      ansible.builtin.command:
        cmd: docker compose build
        chdir: "{{ app_dir }}"
      become_user: "{{ deploy_user }}"
      changed_when: true
      async: 2400
      poll: 20
      tags: [deploy]

    - name: Start infrastructure services first
      ansible.builtin.command:
        cmd: docker compose up -d postgres redis qdrant minio
        chdir: "{{ app_dir }}"
      become_user: "{{ deploy_user }}"
      changed_when: true
      tags: [deploy]

    - name: Wait for infrastructure to be healthy
      ansible.builtin.command:
        cmd: docker compose ps --format json
        chdir: "{{ app_dir }}"
      become_user: "{{ deploy_user }}"
      register: compose_ps
      retries: 30
      delay: 5
      until: "'unhealthy' not in compose_ps.stdout"
      changed_when: false
      tags: [deploy]

    # Start the full stack (incl. monitoring) by default.
    # To run a lighter set, put a space-separated service list in
    # `compose_services` in vars.yml (e.g. to drop prometheus/grafana).
    - name: Start application services
      ansible.builtin.command:
        cmd: "docker compose up -d {{ compose_services | default('') }}"
        chdir: "{{ app_dir }}"
      become_user: "{{ deploy_user }}"
      changed_when: true
      tags: [deploy]

    - name: Wait for university-agent to be healthy
      ansible.builtin.uri:
        url: http://localhost:8000/health
        return_content: true
      register: health
      retries: 30
      delay: 10
      until: health.status == 200
      tags: [deploy]

    # ══════════════════════════════════════════
    # 7. Verify Deployment
    # ══════════════════════════════════════════

    - name: Check all containers are running
      ansible.builtin.command:
        cmd: docker compose ps --format "{{ '{{' }}.Name{{ '}}' }}\t{{ '{{' }}.Status{{ '}}' }}"
        chdir: "{{ app_dir }}"
      become_user: "{{ deploy_user }}"
      register: containers
      changed_when: false
      tags: [deploy, verify]

    - name: Show container status
      ansible.builtin.debug:
        msg: "{{ containers.stdout_lines }}"
      tags: [deploy, verify]

    - name: Verify API gateway (nginx)
      ansible.builtin.uri:
        url: http://localhost:80/health
        return_content: true
      register: nginx_health
      failed_when: nginx_health.status != 200
      tags: [deploy, verify]

    - name: Show health check result
      ansible.builtin.debug:
        msg: "API Gateway health: {{ nginx_health.json }}"
      tags: [deploy, verify]

    - name: Verify Grafana is accessible
      ansible.builtin.uri:
        url: http://localhost:3000/api/health
      register: grafana_health
      failed_when: grafana_health.status != 200
      ignore_errors: true
      tags: [deploy, verify]

    - name: Deployment complete
      ansible.builtin.debug:
        msg: |
          ══════════════════════════════════════════
           UniBot deployed successfully!
          ══════════════════════════════════════════
           API Gateway:  http://{{ server_ip }}:80
           Swagger UI:   http://{{ server_ip }}:80/docs
           Indexer UI:   http://{{ server_ip }}:8001
           Grafana:      http://{{ server_ip }}:3000
           MinIO Console:http://{{ server_ip }}:9001
           Qdrant UI:    http://{{ server_ip }}:6333/dashboard
          ══════════════════════════════════════════
      tags: [deploy, verify]

  # ══════════════════════════════════════════
  # Handlers
  # ══════════════════════════════════════════

  handlers:
    - name: Restart docker compose
      ansible.builtin.command:
        cmd: docker compose restart
        chdir: "{{ app_dir }}"
      become_user: "{{ deploy_user }}"
