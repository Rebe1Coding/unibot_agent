services:
  # ════════════════════════════════════════════
  # Infrastructure
  # ════════════════════════════════════════════

  postgres:
    image: postgres:16-alpine
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: unibot
      POSTGRES_PASSWORD: change-me-postgres-password
      POSTGRES_DB: university
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unibot -d university"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: always

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass change-me-redis-password
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a change-me-redis-password ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: always

  qdrant:
    image: qdrant/qdrant:v1.18.0
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: always

  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: change-me-minio-password
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: always

  # ════════════════════════════════════════════
  # Application
  # ════════════════════════════════════════════

  university-agent:
    build:
      context: .
      dockerfile: university-agent/Dockerfile
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file: ./university-agent/.env
    environment:
      - HF_HOME=/app/.cache/huggingface
    volumes:
      - ./shared:/app/shared:ro
      - ./university-agent/app:/app/app:ro
      - ./university-agent/config.yaml:/app/config.yaml:ro
      - huggingface_cache:/app/.cache/huggingface
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: always

  indexer:
    build: ./indexer
    ports:
      - "8001:8001"
    depends_on:
      qdrant:
        condition: service_healthy
    env_file: ./indexer/.env
    environment:
      - HF_HOME=/app/.cache/huggingface
    volumes:
      - huggingface_cache:/app/.cache/huggingface
    restart: unless-stopped

  web-gui:
    build:
      context: ./web-gui
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:8002:8002"
    depends_on:
      university-agent:
        condition: service_healthy
    env_file: ./web-gui/.env
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8002/metrics')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  log-viewer:
    build:
      context: ./log-viewer
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:3002:3002"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    group_add:
      - "${DOCKER_GID:-983}"
    env_file: ./log-viewer/.env
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:3002/health')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      university-agent:
        condition: service_healthy
      web-gui:
        condition: service_started
      log-viewer:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:80/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: always

  # ════════════════════════════════════════════
  # Monitoring
  # ════════════════════════════════════════════

  prometheus:
    image: prom/prometheus:v2.53.0
    ports:
      - "9090:9090"
    volumes:
      - ./infra/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    depends_on:
      university-agent:
        condition: service_healthy
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.0
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=change-me-grafana-password
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped

  redis-exporter:
    image: oliver006/redis_exporter:v1.62.0
    environment:
      - REDIS_ADDR=redis://redis:6379
      - REDIS_PASSWORD=change-me-redis-password
    ports:
      - "9121:9121"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    environment:
      - DATA_SOURCE_NAME=postgresql://unibot:change-me-postgres-password@postgres:5432/university?sslmode=disable
    ports:
      - "9187:9187"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  celery-worker:
    build:
      context: .
      dockerfile: workers/Dockerfile
    env_file: ./workers/.env
    volumes:
      - ./shared:/app/shared:ro
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "/app/.venv/bin/celery -A workers.celery_app:app inspect ping --timeout 5 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: always

  flower:
    build:
      context: .
      dockerfile: workers/Dockerfile
    command: ["uv", "run", "celery", "-A", "workers.celery_app:app", "flower",
              "--port=5555",
              "--broker_api=redis://:change-me-redis-password@redis:6379/1",
              "--basic_auth=admin:change-me-flower-password"]
    ports:
      - "127.0.0.1:5555:5555"
    env_file: ./workers/.env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  minio_data:
  prometheus_data:
  grafana_data:
  huggingface_cache:
