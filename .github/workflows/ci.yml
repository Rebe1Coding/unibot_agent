name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - name: Install ruff
        run: uv tool install ruff
      - name: Check formatting
        run: ruff format --check university-agent/ indexer/ workers/ web-gui/
      - name: Check linting
        run: ruff check university-agent/ indexer/ workers/ web-gui/

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build university-agent
        run: docker build -t unibot-agent -f university-agent/Dockerfile .
      - name: Build indexer
        run: docker build -t unibot-indexer ./indexer
      - name: Build workers
        run: docker build -t unibot-workers -f workers/Dockerfile .

  security:
    name: Security Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for secrets in code
        run: |
          # Простая проверка: нет ли захардкоженных секретов
          ! grep -rn "sk-ant-\|sk-proj-\|AKIA" \
            --include="*.py" --include="*.yml" --include="*.yaml" \
            university-agent/ indexer/ workers/ web-gui/ || true
      - name: Check .env not committed
        run: |
          # .env файлы не должны быть в git (кроме .env.example)
          if git ls-files --error-unmatch .env 2>/dev/null; then
            echo "ERROR: .env file is committed to git!"
            exit 1
          fi

  # ── Обязательный шаг автотестов: быстрые unit + smoke, без инфраструктуры ──
  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: university-agent
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - name: Install dependencies
        run: uv sync
      - name: Run unit and smoke tests
        run: uv run pytest tests/unit tests/smoke -q

  # ── Выкат на сервер: только из main и только если всё зелёное ──
  deploy:
    name: Deploy (Ansible)
    runs-on: ubuntu-latest
    needs: [lint, docker-build, security, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Install Ansible
        run: pipx install --include-deps ansible
      - name: Add SSH private key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.SERVER_IP }}" >> ~/.ssh/known_hosts
      - name: Run deploy playbook
        working-directory: infra/ansible
        run: |
          ansible-galaxy collection install community.general
          ansible-playbook -i inventory.yml deploy.yml \
            -e "server_ip=${{ secrets.SERVER_IP }}" \
            -e "ssh_key_path=~/.ssh/deploy_key" \
            -e "deploy_user=root" \
            -e "repo_url=${{ secrets.REPO_URL }}" \
            -e "routerai_api_key=${{ secrets.ROUTERAI_API_KEY }}" \
            -e "google_client_id=${{ secrets.GOOGLE_CLIENT_ID }}" \
            -e "google_client_secret=${{ secrets.GOOGLE_CLIENT_SECRET }}" \
            --tags deploy
